server {
    listen       80;
    server_name  localhost;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # SPA fallback: try to serve the request as a file, then as a directory, 
        # then fall back to index.html for client-side routing.
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend service 'forensics'
    location /api/ {
        proxy_pass http://forensics:8765/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /openapi.yaml request to the backend service 'forensics'
    location = /openapi.yaml {
        proxy_pass http://forensics:8765/openapi.yaml;
        proxy_set_header Host $host;
    }

    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
